<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Update Student</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        Name: <input type="text" name="name" value="{{ student.std_name }}"><br>
        Roll: <input type="number" name="roll" value="{{ student.std_roll }}"><br>
        Image: <input type="file" name="image"><br>
        Email: <input type="email" name="email" value="{{ student.std_email }}"><br>
        City: <input type="text" name="city" value="{{ student.std_city }}"><br>
        <button type="submit">Update</button>
    </form>
</body>

</html>
